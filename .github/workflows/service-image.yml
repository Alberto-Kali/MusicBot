name: Service Image CI

on:
  workflow_dispatch:
  push:
    branches:
      - backend
      - telegram-bot
      - telegram-webapp
  pull_request:
    branches:
      - backend
      - telegram-bot
      - telegram-webapp

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build Service Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect image name
        id: vars
        shell: bash
        run: |
          OWNER_LOWER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BRANCH="${GITHUB_BASE_REF}"
          else
            BRANCH="${GITHUB_REF_NAME}"
          fi

          case "$BRANCH" in
            backend) IMAGE="ghcr.io/${OWNER_LOWER}/musicbot-backend" ;;
            telegram-bot) IMAGE="ghcr.io/${OWNER_LOWER}/musicbot-telegram-bot" ;;
            telegram-webapp) IMAGE="ghcr.io/${OWNER_LOWER}/musicbot-telegram-webapp" ;;
            *)
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: github.event_name == 'push' && steps.vars.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR)
        if: github.event_name == 'pull_request' && steps.vars.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ steps.vars.outputs.image }}:pr-${{ github.event.pull_request.number }}

      - name: Build and Push
        if: github.event_name == 'push' && steps.vars.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:latest
            ${{ steps.vars.outputs.image }}:sha-${{ github.sha }}
