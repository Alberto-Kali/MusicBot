name: music

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-music_bot}
      POSTGRES_USER: ${POSTGRES_USER:-music}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-music} -d ${POSTGRES_DB:-music_bot}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    image: ghcr.io/alberto-kali/musicbot-backend:sha-e02f86525bda78d3b75b6b2dd24089685f2bde46
    env_file:
      - .env
      - .env.secrets.backend
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8080}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  telegram-bot:
    image: ghcr.io/alberto-kali/musicbot-telegram-bot:sha-7c0a4b04cd1ff998117a31fe3597a67193734b5e
    env_file:
      - .env
      - .env.secrets.bot
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  telegram-webapp:
    image: ghcr.io/alberto-kali/musicbot-telegram-webapp:sha-6d0fbe8e99f10cf8e915dfd643f875b89be9e58c
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  postgres-data:
